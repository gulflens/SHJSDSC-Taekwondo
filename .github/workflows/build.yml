name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs for the same branch when a new push lands —
# saves macOS runner minutes (the expensive ones).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS Simulator build
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('SHJSDSC.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -project SHJSDSC.xcodeproj -resolvePackageDependencies

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project SHJSDSC.xcodeproj \
            -scheme SHJSDSC \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | grep -E '(error:|warning:|BUILD)' | tail -50

      - name: CLAUDE.md hard rules
        run: |
          set -e
          if grep -rn "import SwiftUI" Core/ ; then
            echo "::error::Core/ has SwiftUI imports — port-blocker rule violated"
            exit 1
          fi
          if grep -rn 'Text("[A-Z]' Features/ Roles/ App/ ; then
            echo "::error::Hardcoded English string literal in views"
            exit 1
          fi
          echo "✓ CLAUDE.md hard rules pass"

  macos:
    name: macOS build
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('SHJSDSC.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project SHJSDSC.xcodeproj \
            -scheme SHJSDSC \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | grep -E '(error:|warning:|BUILD)' | tail -50
